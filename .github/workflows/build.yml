name: Build and Test

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'MainForm.cs'
      - 'Program.cs'
      - '*.csproj'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'MainForm.cs'
      - 'Program.cs'
      - '*.csproj'

jobs:
  build:
    runs-on: windows-latest
    name: Build WhackAMole
    
    strategy:
      matrix:
        dotnet-version: ['8.0.x']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}
    
    - name: Restore dependencies
      run: dotnet restore WhackAMole.csproj
    
    - name: Build project
      run: dotnet build WhackAMole.csproj --configuration Release --no-restore --verbosity normal
    
    - name: Publish Release
      run: dotnet publish WhackAMole.csproj --configuration Release --output ./publish --no-build
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: WhackAMole-Release-${{ runner.os }}
        path: ./publish
        retention-days: 30
    
    - name: Create build summary
      run: |
        echo "## ✅ Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Project**: WhackAMole Game" >> $GITHUB_STEP_SUMMARY
        echo "**Framework**: .NET 8.0" >> $GITHUB_STEP_SUMMARY
        echo "**Configuration**: Release" >> $GITHUB_STEP_SUMMARY
        echo "**Status**: ✨ Build Successful" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "- Build output uploaded to workflow artifacts" >> $GITHUB_STEP_SUMMARY
        echo "- Available for 30 days" >> $GITHUB_STEP_SUMMARY
      shell: bash

  code-quality:
    runs-on: windows-latest
    name: Code Quality Checks
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: List project files
      run: |
        echo "## Project Structure" >> $GITHUB_STEP_SUMMARY
        echo "### Source Files:" >> $GITHUB_STEP_SUMMARY
        Get-ChildItem -File -Filter "*.cs" | ForEach-Object { echo "- $($_.Name)" >> $GITHUB_STEP_SUMMARY }
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Project Configuration:" >> $GITHUB_STEP_SUMMARY
        Get-ChildItem -File -Filter "*.csproj" | ForEach-Object { echo "- $($_.Name)" >> $GITHUB_STEP_SUMMARY }
      shell: powershell

  notify-success:
    runs-on: ubuntu-latest
    name: Notify Build Success
    needs: [build, code-quality]
    if: success()
    
    steps:
    - name: Create success notification
      run: |
        echo "## 🎉 Build Pipeline Completed Successfully" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "All checks passed:" >> $GITHUB_STEP_SUMMARY
        echo "✅ Code compiled successfully" >> $GITHUB_STEP_SUMMARY
        echo "✅ Release artifacts generated" >> $GITHUB_STEP_SUMMARY
        echo "✅ Code quality checks passed" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "**Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
      shell: bash

  notify-failure:
    runs-on: ubuntu-latest
    name: Notify Build Failure
    needs: [build, code-quality]
    if: failure()
    
    steps:
    - name: Create failure notification
      run: |
        echo "## ❌ Build Pipeline Failed" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Please check the build logs for details." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "**Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
      shell: bash
